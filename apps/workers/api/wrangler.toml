name = "watchllm-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "watchllm-db"
database_id = "0556967e-0919-42d0-a979-433bc08a21e3"

[[r2_buckets]]
binding = "TRACES"
bucket_name = "watchllm-traces"

[[kv_namespaces]]
binding = "KV"
id = "1a7d68c963294ea59d7b553a68be55c4"

[[queues.producers]]
binding = "SIMULATION_QUEUE"
queue = "watchllm-simulation-queue"

[vars]
ENVIRONMENT = "production"
PAYMENT_PROVIDER = "razorpay"
RAZORPAY_PLAN_PRO = "plan_pro_monthly"
RAZORPAY_PLAN_TEAM = "plan_team_monthly"

[env.dev]
[env.dev.vars]
ENVIRONMENT = "development"
PAYMENT_PROVIDER = "stripe"
RAZORPAY_PLAN_PRO = "plan_dev_pro"
RAZORPAY_PLAN_TEAM = "plan_dev_team"
