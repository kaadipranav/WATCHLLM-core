name = "watchllm-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "watchllm-db"
database_id = "0556967e-0919-42d0-a979-433bc08a21e3"

[[r2_buckets]]
binding = "TRACES"
bucket_name = "watchllm-traces"

[[kv_namespaces]]
binding = "KV"
id = "1a7d68c963294ea59d7b553a68be55c4"

[[queues.producers]]
binding = "SIMULATION_QUEUE"
queue = "watchllm-simulation-queue"

[vars]
ENVIRONMENT = "production"
PAYMENT_PROVIDER = "dodo"
DODO_API_BASE = "https://api.dodopayments.com/v1"
DODO_PLAN_PRO = "dodo_plan_pro"
DODO_PLAN_TEAM = "dodo_plan_team"
DODO_SUCCESS_URL = "https://watchllm.dev/dashboard?upgraded=1"
DODO_CANCEL_URL = "https://watchllm.dev/dashboard/settings/billing"

[env.dev]
[env.dev.vars]
ENVIRONMENT = "development"
PAYMENT_PROVIDER = "dodo"
DODO_API_BASE = "https://api.dodopayments.com/v1"
DODO_PLAN_PRO = "dodo_plan_dev_pro"
DODO_PLAN_TEAM = "dodo_plan_dev_team"
DODO_SUCCESS_URL = "http://localhost:3000/dashboard?upgraded=1"
DODO_CANCEL_URL = "http://localhost:3000/dashboard/settings/billing"
