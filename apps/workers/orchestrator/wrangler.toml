name = "watchllm-orchestrator"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "watchllm-db"
database_id = "REPLACE_WITH_REAL_D1_ID"

[[r2_buckets]]
binding = "TRACES"
bucket_name = "watchllm-traces"

[[kv_namespaces]]
binding = "KV"
id = "REPLACE_WITH_REAL_KV_ID"

[[queues.consumers]]
queue = "watchllm-simulation-queue"
max_batch_size = 10
max_batch_timeout = 5

[[services]]
binding = "CHAOS_WORKER"
service = "watchllm-chaos"

[vars]
ENVIRONMENT = "production"

[env.dev]
[env.dev.vars]
ENVIRONMENT = "development"
